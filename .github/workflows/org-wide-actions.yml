name: Angular Org Actions

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Runs once per day.

# Declare default permissions as read only.
permissions:
  contents: read

env:
  REPOS: |
    dev-infra
    angular
    angular-cli
    components

jobs:
  labels_sync:
    if: github.repository == 'angular/dev-infra'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/local-actions/labels-sync
        with:
          angular-robot-key: ${{ secrets.ANGULAR_ROBOT_PRIVATE_KEY }}
          repos: ${{ env.REPOS }}

  lock_closed:
    if: github.repository == 'angular/dev-infra'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/local-actions/lock-closed
        with:
          lock-bot-key: ${{ secrets.LOCK_BOT_PRIVATE_KEY }}
          repos: ${{ env.REPOS }}

  stale_pr_cleanup:
    if: github.repository == 'angular/dev-infra'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/local-actions/stale-cleanup
        with:
          angular-robot-key: ${{ secrets.ANGULAR_ROBOT_PRIVATE_KEY }}
          repos: ${{ env.REPOS }}
